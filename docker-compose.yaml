services:
  plex-meta-editor:
    build: .
    ports:
      - "3232:3232"
    volumes:
      # Mount macOS Plex data directory to the standard Linux Plex path.
      # The app auto-discovers the DB and Preferences.xml from this location.
      - ~/Library/Application Support/Plex Media Server:/var/lib/plexmediaserver/Library/Application Support/Plex Media Server
      # Persist backups outside the container
      - plex-meta-editor-backups:/var/lib/plexmediaserver/Library/Application Support/Plex Media Server/Plug-in Support/Databases/plex-meta-editor-backups
    environment:
      # Point at the Plex server running on the host machine
      - PLEX_SERVER_URL=http://host.docker.internal:32400
      # macOS stores the Plex token in a plist, which Linux can't read.
      # Set PLEX_TOKEN in a .env file next to this compose file.
      # Extract it with: plutil -extract PlexOnlineToken raw ~/Library/Preferences/com.plexapp.plexmediaserver.plist
      - PLEX_TOKEN=${PLEX_TOKEN}

volumes:
  plex-meta-editor-backups:
